<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { margin: 0; }
      #icon { width: 1024px; height: 1024px; }
    </style>
  </head>
  <body>
    <div id="icon">
      <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#128d78" />
            <stop offset="1" stop-color="#0a5346" />
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)" />
        <!-- warp threads -->
        <g stroke="#ffffff" stroke-opacity="0.28" stroke-width="26" stroke-linecap="round">
          <line x1="252" y1="300" x2="772" y2="300" />
          <line x1="252" y1="440" x2="772" y2="440" />
          <line x1="252" y1="580" x2="772" y2="580" />
          <line x1="252" y1="720" x2="772" y2="720" />
        </g>
        <!-- weaving thread -->
        <path
          d="M 212 300
             C 340 300 340 440 468 440
             C 596 440 596 300 724 300
             M 212 580
             C 340 580 340 720 468 720
             C 596 720 596 580 724 580"
          fill="none" stroke="#ffffff" stroke-width="46" stroke-linecap="round"
        />
        <!-- needle -->
        <g transform="rotate(38 700 480)">
          <rect x="672" y="240" width="56" height="470" rx="28" fill="#f4d06f" />
          <circle cx="700" cy="300" r="16" fill="#0a5346" />
        </g>
      </svg>
    </div>
  </body>
</html>
