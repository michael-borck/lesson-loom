name: Release desktop app

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing/notarization (optional — add these repo secrets later):
          # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
          # APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Lesson Loom ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform below:
            - **macOS**: `.dmg` (Apple Silicon: `aarch64`, Intel: `x64`)
            - **Windows**: `-setup.exe`
            - **Linux**: `.AppImage` or `.deb`

            macOS builds are not yet notarized — right-click the app and choose Open the first time.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
